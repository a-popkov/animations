<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./animation.css" />
    <title>Viking</title>
  </head>

  <body class="page">
    <div class="frame">
      <div class="forest"></div>
      <div class="ground"></div>

      <div class="viking">
        <div class="viking__shoulder_right">
          <div class="viking__arm_right">
            <div class="viking__hand_right"></div>
          </div>
        </div>

        <div class="viking__leg_right">
          <div class="viking__shin_right">
            <div class="viking__foot_right">
              <div></div>
            </div>
          </div>
        </div>

        <div class="viking__leg_left">
          <div class="viking__shin_left">
            <div class="viking__foot_left">
              <div></div>
            </div>
          </div>
        </div>

        <div class="viking__belt"></div>

        <div class="viking__head">
          <div class="viking__beard">
            <div></div>
          </div>
          <div class="viking__helmet">
            <div></div>
          </div>
          <div class="viking__face">
            <div class="viking__brows"></div>
          </div>
        </div>

        <div class="viking__shoulder_left">
          <div class="viking__arm_left">
            <div class="viking__hand_left">
              <div class="viking__axe">
                <div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
